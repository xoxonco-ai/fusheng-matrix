<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浮生矩陣｜我的報告</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="members.css">
<style>.wrap{max-width:1180px}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="brand" href="index.html">浮生矩陣</a>
    <div class="row">
      <span class="muted" id="who" style="font-family:var(--sans);font-size:13px"></span>
      <a class="btn ghost small" id="adminlink" href="admin.html" style="display:none">管理後台</a>
      <button class="btn ghost small" id="signout">登出</button>
    </div>
  </div>
  <h1>我的浮生矩陣報告</h1>
  <p class="sub">看見劇本，才能走出劇本</p>
  <div id="content"><div class="loadingfull">載入中…</div></div>
</div>

<script>
const sb = supabase.createClient(window.SB_URL, window.SB_KEY);
const $=id=>document.getElementById(id);
const VLABEL={script:'劇本版 · 看見人生主線', breakthrough:'破局版 · 找出困住你的劇本'};
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

$('signout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.href='login.html'; });

// 訂單狀態橫幅：付款後生成中 → 每 20 秒自動更新
async function orderBanner(userId){
  const {data:orders} = await sb.from('orders').select('status,error,created_at').eq('user_id',userId).order('created_at',{ascending:false}).limit(1);
  const o = orders && orders[0];
  if(!o) return {html:'', generating:false};
  if(o.status==='paid'||o.status==='generating'){
    return {generating:true, html:`<div class="card center" style="border-color:var(--gold)">
      <p style="font-family:var(--sans);font-size:16px;color:var(--gold-bright);margin-bottom:6px">✦ 付款成功，你的萬字報告正在生成中…</p>
      <p class="muted" style="font-family:var(--sans);font-size:13.5px;line-height:1.9">系統正依你的命盤撰寫「劇本版」與「破局版」兩份報告，約需 5～10 分鐘。<br>本頁會自動更新，也可以先關掉，之後隨時登入回來看。</p>
    </div>`};
  }
  if(o.status==='pending' && (Date.now()-new Date(o.created_at).getTime()) < 24*3600e3){
    return {generating:false, html:`<div class="card center">
      <p style="font-family:var(--sans);font-size:15px;color:var(--muted)">你有一筆尚未完成的付款。<a href="paipan.html" style="color:var(--gold-bright)">回排盤頁重新購買 →</a></p>
    </div>`};
  }
  if(o.status==='failed'){
    return {generating:false, html:`<div class="card center">
      <p style="font-family:var(--sans);font-size:15px;color:var(--crimson-bright,#d98a9c);margin-bottom:6px">報告生成遇到問題</p>
      <p class="muted" style="font-family:var(--sans);font-size:13.5px;line-height:1.9">請不用擔心，你的付款已收到。私訊我們任一平台，會盡快為你補上：
      <a href="https://www.facebook.com/floatingmatrix" target="_blank" rel="noopener" style="color:var(--gold-bright)">Facebook</a> ·
      <a href="https://www.instagram.com/floating_matrix/" target="_blank" rel="noopener" style="color:var(--gold-bright)">Instagram</a></p>
    </div>`};
  }
  return {html:'', generating:false};
}

(async ()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ location.href='login.html'; return; }
  $('who').textContent = session.user.email;
  const {data:prof} = await sb.from('profiles').select('role').eq('id',session.user.id).maybeSingle();
  if(prof && prof.role==='admin'){ $('adminlink').style.display='inline-block'; }

  // 安全函式：只回傳「自己的、已發布」報告；萬字未解鎖時 full_content 為 null（根本不送到前端）
  const {data:reports, error} = await sb.rpc('my_reports');
  const banner = await orderBanner(session.user.id);
  if(banner.generating){ setTimeout(()=>location.reload(), 20000); }

  const box=$('content');
  if(error){ box.innerHTML=`<div class="card"><div class="msg err" style="display:block">讀取失敗：${esc(error.message)}</div></div>`; return; }
  if(!reports || !reports.length){
    box.innerHTML= banner.html || `<div class="card center">
      <p style="font-family:var(--sans);font-size:16px;color:var(--gold-bright);margin-bottom:8px">登入成功 ✦</p>
      <p class="muted" style="font-family:var(--sans)">購買後，你的千字精華與萬字報告就會出現在這裡。</p>
      <p class="muted" style="font-family:var(--sans);margin-top:14px;font-size:13.5px">還沒有報告？先免費排盤，再一鍵解鎖萬字（NT$199，劇本版＋破局版）。</p>
      <div class="row" style="justify-content:center;margin-top:16px">
        <a class="btn small" href="paipan.html">免費排盤 · 解鎖萬字 →</a>
      </div>
      <p class="muted" style="font-family:var(--sans);margin-top:18px;font-size:12.5px">有問題？私訊我們：
        <a href="https://www.facebook.com/floatingmatrix" target="_blank" rel="noopener" style="color:var(--gold-bright)">Facebook</a> ·
        <a href="https://www.instagram.com/floating_matrix/" target="_blank" rel="noopener" style="color:var(--gold-bright)">Instagram</a> ·
        <a href="https://www.threads.com/@floating_matrix" target="_blank" rel="noopener" style="color:var(--gold-bright)">Threads</a>
      </p>
    </div>`;
    return;
  }
  // 依個案分組，劇本版 / 破局版 並列
  const byCase={};
  reports.forEach(r=>{ (byCase[r.case_id]=byCase[r.case_id]||{info:r,v:{}}); byCase[r.case_id].v[r.version]=r; });
  const VL={script:'劇本版',breakthrough:'破局版'};
  const VS={script:'看見你的人生主線',breakthrough:'找出困住你的劇本'};
  const col=(g,ver)=>{
    const r=g.v[ver];
    if(!r) return `<div class="vcol"><div class="vhead ${ver}">${VL[ver]}</div><p class="muted" style="font-family:var(--sans);padding:10px 0">尚未提供</p></div>`;
    const full = r.full_content
      ? `<div class="report-body">${esc(r.full_content)}</div>`
      : `<div class="locked"><div class="lock-ic">🔒</div><p>完整萬字報告尚未解鎖</p><p class="muted">付費解鎖後即可查看</p></div>`;
    return `<div class="vcol">
      <div class="vhead ${ver}">${VL[ver]}<span>${VS[ver]}</span></div>
      ${r.excerpt?`<p class="vsub">千字精華</p><div class="excerpt-body">${esc(r.excerpt)}</div>`:''}
      <hr><p class="vsub">完整報告</p>${full}
    </div>`;
  };
  const groups=Object.values(byCase);
  const idx = groups.length>1
    ? `<div class="case-index"><span>個案：</span>${groups.map((g,i)=>`<a href="#case-${i}">${esc(g.info.case_name||'命盤')}</a>`).join('')}</div>`
    : '';
  box.innerHTML = banner.html + idx + groups.map((g,i)=>{
    const c=g.info;
    return `<div class="case-block" id="case-${i}">
      <h2 class="case-name">${esc(c.case_name||'我的命盤')}<span>${esc(c.birth_date||'')} ${esc(c.birth_place||'')}</span></h2>
      <div class="parallel">${col(g,'script')}${col(g,'breakthrough')}</div>
    </div>`;
  }).join('');
})();
</script>
</body>
</html>
